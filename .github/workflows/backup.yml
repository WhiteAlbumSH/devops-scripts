name: Backup Script CI

on:
  push:
    branches: [ main ]

jobs:
  run-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker
        uses: docker/setup-buildx-action@v3

      - name: Build docker
        run: docker build -t backup-bot-test .

      - name: Run docker
        run: docker run --rm backup-bot-test
